<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landslide Identification - Active Contour & Fault Fracture Density (FFD)</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f1f5f9; margin: 0; padding: 20px; color: #334155; }
        .container { max-width: 1600px; margin: 0 auto; background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        /* Navigation Top Bar */
        .top-nav { display: flex; justify-content: flex-start; align-items: center; margin-bottom: 15px; }
        .btn-back { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; color: #475569; font-weight: 600; font-size: 0.95rem; padding: 8px 14px; background: #e2e8f0; border-radius: 6px; transition: all 0.2s; }
        .btn-back:hover { background: #cbd5e1; color: #0f172a; }

        h1 { text-align: center; color: #0f172a; margin-bottom: 20px; font-size: 1.8rem; }
        .control-panel { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: center; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .btn { background-color: #2563eb; color: white; border: none; padding: 10px 16px; font-size: 0.95rem; font-weight: 600; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background-color: #1d4ed8; }
        .btn:disabled { background-color: #94a3b8; cursor: not-allowed; }
        .btn-warning { background-color: #f59e0b; color: white; }
        .btn-warning:hover { background-color: #d97706; }
        .btn-danger { background-color: #ef4444; }
        .btn-danger:hover { background-color: #dc2626; }
        .btn-info { background-color: #0284c7; color: white; }
        .btn-info:hover { background-color: #0369a1; }

        .input-group { display: flex; align-items: center; gap: 8px; }
        input[type="number"] { width: 85px; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.95rem; text-align: center; }
        .progress-bar-container { width: 100%; background: #e2e8f0; border-radius: 6px; height: 12px; overflow: hidden; margin-top: 10px; display: none; }
        .progress-bar { width: 0%; height: 100%; background: #2563eb; transition: width 0.2s; }
        
        /* Grid Layout 4 Panel Canvas */
        .canvas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 15px; }
        .canvas-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; text-align: center; }
        .canvas-card h3 { margin-top: 0; margin-bottom: 10px; font-size: 1.0rem; color: #475569; }
        canvas { max-width: 100%; height: auto; border: 1px solid #cbd5e1; border-radius: 4px; background: #000; }
        #statusText { text-align: center; margin-top: 10px; font-weight: 600; color: #2563eb; }
    </style>
</head>
<body>

<div class="container">
    <!-- Tombol Back ke Halaman Projects -->
    <div class="top-nav">
        <a href="../index.html" class="btn-back">&larr; Kembali ke Projects</a>
    </div>

    <h1>Landslide Identification - Active Contour & Fault Fracture Density (FFD)</h1>

    <div class="control-panel">
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        
        <!-- 1. Buka Citra -->
        <button class="btn" id="btnOpen" onclick="document.getElementById('fileInput').click()">1. Buka Citra</button>

        <!-- Input Iterasi -->
        <div class="input-group">
            <label for="edit1"><strong>Iterasi:</strong></label>
            <input type="number" id="edit1" value="300" min="1" max="5000">
        </div>

        <!-- 2. Segmentasi -->
        <button class="btn" id="btnProcess" onclick="startSegmentation()">2. Segmentasi</button>
        
        <!-- 3. Stop -->
        <button class="btn btn-warning" id="btnStop" onclick="stopSegmentation()" disabled>3. Stop</button>
        
        <!-- 4. Reset -->
        <button class="btn btn-danger" id="btnReset" onclick="resetApp()">4. Reset</button>

        <!-- 5. Copyright -->
        <button class="btn btn-info" id="btnCopyright" onclick="window.open('https://github.com/nanang1212/projects/blob/main/landslide/copyright.pdf', '_blank')">5. Copyright</button>
    </div>

    <div id="statusText">Pilih file citra drone untuk memulai...</div>
    <div class="progress-bar-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="canvas-grid">
        <div class="canvas-card">
            <h3>1. Citra Asli (Initial Contour)</h3>
            <canvas id="canvasInput"></canvas>
        </div>
        <div class="canvas-card">
            <h3>2. Active Contour (Chan-Vese)</h3>
            <canvas id="canvasOutput"></canvas>
        </div>
        <div class="canvas-card">
            <h3>3. Hasil Identifikasi (Mask Biner)</h3>
            <canvas id="canvasMask"></canvas>
        </div>
        <div class="canvas-card">
            <h3>4. Garis Kelurusan Utama (FFD Dominan)</h3>
            <canvas id="canvasFFD"></canvas>
        </div>
    </div>
</div>

<script>
    let originalImageData = null;
    let imgWidth = 0;
    let imgHeight = 0;
    let activeWorker = null;

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                imgWidth = img.width;
                imgHeight = img.height;

                const canvasIn = document.getElementById('canvasInput');
                const canvasOut = document.getElementById('canvasOutput');
                const canvasMask = document.getElementById('canvasMask');
                const canvasFFD = document.getElementById('canvasFFD');

                canvasIn.width = imgWidth; canvasIn.height = imgHeight;
                canvasOut.width = imgWidth; canvasOut.height = imgHeight;
                canvasMask.width = imgWidth; canvasMask.height = imgHeight;
                canvasFFD.width = imgWidth; canvasFFD.height = imgHeight;

                const ctxIn = canvasIn.getContext('2d');
                ctxIn.drawImage(img, 0, 0);
                
                originalImageData = ctxIn.getImageData(0, 0, imgWidth, imgHeight);

                // Gambarkan kontur kotak merah awal pada canvas 1
                const marginY = Math.round(imgHeight * 0.25);
                const marginX = Math.round(imgWidth * 0.25);
                ctxIn.strokeStyle = '#ef4444';
                ctxIn.lineWidth = Math.max(3, Math.round(imgWidth / 250));
                ctxIn.strokeRect(marginX, marginY, imgWidth - 2 * marginX, imgHeight - 2 * marginY);

                // Bersihkan canvas 2, 3, dan 4
                canvasOut.getContext('2d').clearRect(0, 0, imgWidth, imgHeight);
                canvasMask.getContext('2d').clearRect(0, 0, imgWidth, imgHeight);
                canvasFFD.getContext('2d').clearRect(0, 0, imgWidth, imgHeight);

                document.getElementById('statusText').innerText = `Citra dimuat (${imgWidth} x ${imgHeight} px). Siap diproses.`;
                document.getElementById('progressContainer').style.display = 'none';
                document.getElementById('progressBar').style.width = '0%';
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // Worker Web - Ekstraksi 1-2 Garis Kelurusan Utama (Dominant Major Lineaments)
    const workerScript = `
        function drawThickLine(pixels, width, height, x0, y0, x1, y1, r, g, b, thickness) {
            x0 = Math.round(x0); y0 = Math.round(y0);
            x1 = Math.round(x1); y1 = Math.round(y1);
            const dx = Math.abs(x1 - x0), sx = x0 < x1 ? 1 : -1;
            const dy = -Math.abs(y1 - y0), sy = y0 < y1 ? 1 : -1;
            let err = dx + dy, e2;
            while (true) {
                for (let ty = -thickness; ty <= thickness; ty++) {
                    for (let tx = -thickness; tx <= thickness; tx++) {
                        const px = x0 + tx, py = y0 + ty;
                        if (px >= 0 && px < width && py >= 0 && py < height) {
                            const idx = (py * width + px) * 4;
                            pixels[idx] = r;
                            pixels[idx+1] = g;
                            pixels[idx+2] = b;
                            pixels[idx+3] = 255;
                        }
                    }
                }
                if (x0 === x1 && y0 === y1) break;
                e2 = 2 * err;
                if (e2 >= dy) { err += dy; x0 += sx; }
                if (e2 <= dx) { err += dx; y0 += sy; }
            }
        }

        self.onmessage = function(e) {
            const { srcData, width, height, numIter } = e.data;
            const len = width * height;

            // 1. Normalisasi RGB
            const R = new Float32Array(len);
            const G = new Float32Array(len);
            const B = new Float32Array(len);

            for (let i = 0; i < len; i++) {
                R[i] = srcData[i * 4] / 255.0;
                G[i] = srcData[i * 4 + 1] / 255.0;
                B[i] = srcData[i * 4 + 2] / 255.0;
            }

            // 2. Inisialisasi Level Set Phi
            let phi = new Float32Array(len);
            const marginY = Math.round(height * 0.25);
            const marginX = Math.round(width * 0.25);

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = y * width + x;
                    if (y >= marginY && y <= height - marginY && x >= marginX && x <= width - marginX) {
                        phi[idx] = -1.0;
                    } else {
                        phi[idx] = 1.0;
                    }
                }
            }

            const dt = 0.8;
            const mu = 0.2; 
            const nextPhi = new Float32Array(len);

            // 3. Iterasi Active Contour
            for (let iter = 1; iter <= numIter; iter++) {
                let sumR1 = 0, sumG1 = 0, sumB1 = 0, count1 = 0;
                let sumR2 = 0, sumG2 = 0, sumB2 = 0, count2 = 0;

                for (let i = 0; i < len; i++) {
                    if (phi[i] <= 0) {
                        sumR1 += R[i]; sumG1 += G[i]; sumB1 += B[i];
                        count1++;
                    } else {
                        sumR2 += R[i]; sumG2 += G[i]; sumB2 += B[i];
                        count2++;
                    }
                }

                const c1R = count1 > 0 ? sumR1 / count1 : 0.5;
                const c1G = count1 > 0 ? sumG1 / count1 : 0.5;
                const c1B = count1 > 0 ? sumB1 / count1 : 0.5;

                const c2R = count2 > 0 ? sumR2 / count2 : 0.5;
                const c2G = count2 > 0 ? sumG2 / count2 : 0.5;
                const c2B = count2 > 0 ? sumB2 / count2 : 0.5;

                for (let y = 1; y < height - 1; y++) {
                    for (let x = 1; x < width - 1; x++) {
                        const idx = y * width + x;

                        const dR1 = R[idx] - c1R, dG1 = G[idx] - c1G, dB1 = B[idx] - c1B;
                        const dR2 = R[idx] - c2R, dG2 = G[idx] - c2G, dB2 = B[idx] - c2B;

                        const dist1 = dR1*dR1 + dG1*dG1 + dB1*dB1;
                        const dist2 = dR2*dR2 + dG2*dG2 + dB2*dB2;

                        const force = dist1 - dist2;
                        const laplacian = (phi[idx - 1] + phi[idx + 1] + phi[idx - width] + phi[idx + width] - 4.0 * phi[idx]);

                        let p = phi[idx] + dt * (force + mu * laplacian);

                        if (p > 2.0) p = 2.0;
                        if (p < -2.0) p = -2.0;

                        nextPhi[idx] = p;
                    }
                }

                for (let x = 0; x < width; x++) {
                    nextPhi[x] = phi[x];
                    nextPhi[(height - 1) * width + x] = phi[(height - 1) * width + x];
                }
                for (let y = 0; y < height; y++) {
                    nextPhi[y * width] = phi[y * width];
                    nextPhi[y * width + width - 1] = phi[y * width + width - 1];
                }

                phi.set(nextPhi);

                if (iter % 10 === 0 || iter === numIter) {
                    self.postMessage({ type: 'progress', iter: iter, total: numIter });
                }
            }

            // 4. Render Canvas 2, Canvas 3, dan Canvas 4 (Garis Kelurusan Utama)
            const outPixels = new Uint8ClampedArray(len * 4);
            const maskPixels = new Uint8ClampedArray(len * 4);
            const ffdPixels = new Uint8ClampedArray(len * 4);
            const boundaryMap = new Uint8Array(len);

            const borderThickness = Math.max(1, Math.round(width / 500));

            // Langkah A: Deteksi Boundary
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = y * width + x;
                    const pxIdx = idx * 4;
                    const isInside = phi[idx] <= 0;

                    let isBoundary = false;
                    if (isInside) {
                        for (let dy = -borderThickness; dy <= borderThickness; dy++) {
                            for (let dx = -borderThickness; dx <= borderThickness; dx++) {
                                const ny = y + dy;
                                const nx = x + dx;
                                if (ny >= 0 && ny < height && nx >= 0 && nx < width) {
                                    if (phi[ny * width + nx] > 0) {
                                        isBoundary = true;
                                        break;
                                    }
                                }
                            }
                            if (isBoundary) break;
                        }
                    }

                    if (isBoundary) boundaryMap[idx] = 1;

                    // Canvas 2: Overlay
                    if (isBoundary) {
                        outPixels[pxIdx] = 255; outPixels[pxIdx + 1] = 0; outPixels[pxIdx + 2] = 0;
                    } else if (isInside) {
                        outPixels[pxIdx] = Math.round(srcData[pxIdx] * 0.3);
                        outPixels[pxIdx + 1] = Math.min(255, srcData[pxIdx + 1] + 120);
                        outPixels[pxIdx + 2] = Math.round(srcData[pxIdx + 2] * 0.3);
                    } else {
                        outPixels[pxIdx] = srcData[pxIdx];
                        outPixels[pxIdx + 1] = srcData[pxIdx + 1];
                        outPixels[pxIdx + 2] = srcData[pxIdx + 2];
                    }
                    outPixels[pxIdx + 3] = 255;

                    // Canvas 3: Mask Biner
                    if (isInside) {
                        maskPixels[pxIdx] = 255; maskPixels[pxIdx + 1] = 255; maskPixels[pxIdx + 2] = 255;
                    } else {
                        maskPixels[pxIdx] = 0; maskPixels[pxIdx + 1] = 0; maskPixels[pxIdx + 2] = 0;
                    }
                    maskPixels[pxIdx + 3] = 255;

                    // Canvas 4: Citra Asli dengan kontras lembut
                    ffdPixels[pxIdx]     = srcData[pxIdx];
                    ffdPixels[pxIdx + 1] = srcData[pxIdx + 1];
                    ffdPixels[pxIdx + 2] = srcData[pxIdx + 2];
                    ffdPixels[pxIdx + 3] = 255;
                }
            }

            // Langkah B: Peta Densitas Grid (Pencarian Klaster Longsor Paling Kritis)
            const gridDim = 12;
            const cellW = Math.floor(width / gridDim);
            const cellH = Math.floor(height / gridDim);
            const gridDensity = new Float32Array(gridDim * gridDim);

            for (let gy = 0; gy < gridDim; gy++) {
                for (let gx = 0; gx < gridDim; gx++) {
                    let count = 0;
                    for (let y = gy * cellH; y < Math.min((gy + 1) * cellH, height); y++) {
                        for (let x = gx * cellW; x < Math.min((gx + 1) * cellW, width); x++) {
                            if (boundaryMap[y * width + x] === 1) count++;
                        }
                    }
                    gridDensity[gy * gridDim + gx] = count;
                }
            }

            // Cari Hotspot 1 (Klaster Densitas Tertinggi Utama)
            let maxD1 = -1, h1x = width / 2, h1y = height / 2;
            for (let i = 0; i < gridDim * gridDim; i++) {
                if (gridDensity[i] > maxD1) {
                    maxD1 = gridDensity[i];
                    h1x = (i % gridDim) * cellW + cellW / 2;
                    h1y = Math.floor(i / gridDim) * cellH + cellH / 2;
                }
            }

            // Cari Hotspot 2 (Klaster Terpisah dengan Jarak Minimal)
            let maxD2 = -1, h2x = -1, h2y = -1;
            const minSeparation = Math.min(width, height) * 0.35;
            for (let i = 0; i < gridDim * gridDim; i++) {
                const cx = (i % gridDim) * cellW + cellW / 2;
                const cy = Math.floor(i / gridDim) * cellH + cellH / 2;
                const dist = Math.hypot(cx - h1x, cy - h1y);
                if (dist >= minSeparation && gridDensity[i] > maxD2) {
                    maxD2 = gridDensity[i];
                    h2x = cx; h2y = cy;
                }
            }

            // Fungsi Kalkulasi Garis Kelurusan Utama via PCA
            function getMajorLineament(cx, cy) {
                const radius = Math.min(width, height) * 0.35;
                let ptsX = [], ptsY = [];

                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        if (boundaryMap[y * width + x] === 1) {
                            if (Math.hypot(x - cx, y - cy) <= radius) {
                                ptsX.push(x); ptsY.push(y);
                            }
                        }
                    }
                }

                if (ptsX.length < 15) return null;

                let mx = 0, my = 0;
                for (let i = 0; i < ptsX.length; i++) { mx += ptsX[i]; my += ptsY[i]; }
                mx /= ptsX.length; my /= ptsY.length;

                let Cxx = 0, Cyy = 0, Cxy = 0;
                for (let i = 0; i < ptsX.length; i++) {
                    const dx = ptsX[i] - mx, dy = ptsY[i] - my;
                    Cxx += dx * dx; Cyy += dy * dy; Cxy += dx * dy;
                }

                const angle = 0.5 * Math.atan2(2 * Cxy, Cxx - Cyy);
                const cosA = Math.cos(angle), sinA = Math.sin(angle);

                let maxProj = 0;
                for (let i = 0; i < ptsX.length; i++) {
                    const proj = Math.abs((ptsX[i] - mx) * cosA + (ptsY[i] - my) * sinA);
                    if (proj > maxProj) maxProj = proj;
                }

                const lineLen = Math.min(maxProj * 1.8, Math.min(width, height) * 0.65);

                return {
                    x0: mx - lineLen * cosA, y0: my - lineLen * sinA,
                    x1: mx + lineLen * cosA, y1: my + lineLen * sinA,
                    pts: ptsX
                };
            }

            const line1 = getMajorLineament(h1x, h1y);
            const line2 = (maxD2 > maxD1 * 0.35) ? getMajorLineament(h2x, h2y) : null;

            // Highlight Zona Rawan (Overlay Merah Halus)
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    if (boundaryMap[y * width + x] === 1) {
                        const pxIdx = (y * width + x) * 4;
                        ffdPixels[pxIdx] = Math.min(255, ffdPixels[pxIdx] + 120);
                        ffdPixels[pxIdx + 1] = Math.round(ffdPixels[pxIdx + 1] * 0.4);
                        ffdPixels[pxIdx + 2] = Math.round(ffdPixels[pxIdx + 2] * 0.4);
                    }
                }
            }

            const mainLineThick = Math.max(3, Math.round(width / 200));

            // Gambar GARIS KELURUSAN UTAMA 1 (Kuning Neon + Garis Tepi Merah)
            if (line1) {
                // Outline Merah
                drawThickLine(ffdPixels, width, height, line1.x0, line1.y0, line1.x1, line1.y1, 220, 38, 38, mainLineThick + 2);
                // Inti Kuning Neon
                drawThickLine(ffdPixels, width, height, line1.x0, line1.y0, line1.x1, line1.y1, 250, 204, 21, mainLineThick);
            }

            // Gambar GARIS KELURUSAN UTAMA 2 (Cyan Neon + Garis Tepi Biru)
            if (line2) {
                // Outline Biru
                drawThickLine(ffdPixels, width, height, line2.x0, line2.y0, line2.x1, line2.y1, 30, 58, 138, mainLineThick + 2);
                // Inti Cyan Neon
                drawThickLine(ffdPixels, width, height, line2.x0, line2.y0, line2.x1, line2.y1, 6, 182, 212, mainLineThick);
            }

            self.postMessage({ type: 'done', outPixels: outPixels, maskPixels: maskPixels, ffdPixels: ffdPixels });
        };
    `;

    function startSegmentation() {
        if (!originalImageData) {
            alert("Silakan buka citra terlebih dahulu!");
            return;
        }

        const numIter = parseInt(document.getElementById('edit1').value) || 300;

        document.getElementById('btnProcess').disabled = true;
        document.getElementById('btnOpen').disabled = true;
        document.getElementById('btnStop').disabled = false;
        document.getElementById('progressContainer').style.display = 'block';
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('statusText').innerText = `Memulai segmentasi & ekstraksi Garis Kelurusan Utama (${numIter} iterasi)...`;

        if (activeWorker) activeWorker.terminate();

        const blob = new Blob([workerScript], { type: 'application/javascript' });
        activeWorker = new Worker(URL.createObjectURL(blob));

        activeWorker.postMessage({
            srcData: originalImageData.data,
            width: imgWidth,
            height: imgHeight,
            numIter: numIter
        });

        activeWorker.onmessage = function(e) {
            if (e.data.type === 'progress') {
                const percent = Math.round((e.data.iter / e.data.total) * 100);
                document.getElementById('progressBar').style.width = percent + '%';
                document.getElementById('statusText').innerText = `Memproses: Iterasi ${e.data.iter} / ${e.data.total} (${percent}%)`;
            } else if (e.data.type === 'done') {
                // Render Canvas 2 (Overlay Active Contour)
                const canvasOut = document.getElementById('canvasOutput');
                const ctxOut = canvasOut.getContext('2d');
                const finalImgData = ctxOut.createImageData(imgWidth, imgHeight);
                finalImgData.data.set(e.data.outPixels);
                ctxOut.putImageData(finalImgData, 0, 0);

                // Render Canvas 3 (Mask Biner)
                const canvasMask = document.getElementById('canvasMask');
                const ctxMask = canvasMask.getContext('2d');
                const maskImgData = ctxMask.createImageData(imgWidth, imgHeight);
                maskImgData.data.set(e.data.maskPixels);
                ctxMask.putImageData(maskImgData, 0, 0);

                // Render Canvas 4 (Garis Kelurusan Utama FFD)
                const canvasFFD = document.getElementById('canvasFFD');
                const ctxFFD = canvasFFD.getContext('2d');
                const ffdImgData = ctxFFD.createImageData(imgWidth, imgHeight);
                ffdImgData.data.set(e.data.ffdPixels);
                ctxFFD.putImageData(ffdImgData, 0, 0);

                document.getElementById('statusText').innerText = "Proses Selesai! Garis Kelurusan Utama Longsor berhasil diidentifikasi.";
                finishProcessingState();
            }
        };

        activeWorker.onerror = function(err) {
            console.error("Worker Error:", err);
            document.getElementById('statusText').innerText = "Terjadi kesalahan saat pemrosesan.";
            finishProcessingState();
        };
    }

    function stopSegmentation() {
        if (activeWorker) {
            activeWorker.terminate();
            activeWorker = null;
            document.getElementById('statusText').innerText = "Proses segmentasi dihentikan.";
            finishProcessingState();
        }
    }

    function resetApp() {
        if (activeWorker) {
            activeWorker.terminate();
            activeWorker = null;
        }

        originalImageData = null;
        document.getElementById('fileInput').value = '';

        const canvasIn = document.getElementById('canvasInput');
        const canvasOut = document.getElementById('canvasOutput');
        const canvasMask = document.getElementById('canvasMask');
        const canvasFFD = document.getElementById('canvasFFD');

        canvasIn.getContext('2d').clearRect(0, 0, canvasIn.width, canvasIn.height);
        canvasOut.getContext('2d').clearRect(0, 0, canvasOut.width, canvasOut.height);
        canvasMask.getContext('2d').clearRect(0, 0, canvasMask.width, canvasMask.height);
        canvasFFD.getContext('2d').clearRect(0, 0, canvasFFD.width, canvasFFD.height);

        document.getElementById('statusText').innerText = "Aplikasi di-reset.";
        document.getElementById('progressContainer').style.display = 'none';
        document.getElementById('progressBar').style.width = '0%';
        finishProcessingState();
    }

    function finishProcessingState() {
        document.getElementById('btnProcess').disabled = false;
        document.getElementById('btnOpen').disabled = false;
        document.getElementById('btnStop').disabled = true;
    }
</script>
</body>
</html>
