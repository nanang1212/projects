<script>
    let imgElement = new Image();
    let originalImageData = null;
    let procWidth = 0, procHeight = 0;

    // 1. PUSHBUTTON1: Buka Gambar & Resize Otomatis
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            imgElement.onload = function() {
                const canvasIn = document.getElementById('canvasInput');
                const canvasOut = document.getElementById('canvasOutput');
                
                // Batasi resolusi pemrosesan maks 450px agar iterasi cepat & tidak hang
                const maxDim = 450;
                let w = imgElement.width;
                let h = imgElement.height;
                if (w > maxDim || h > maxDim) {
                    if (w > h) {
                        h = Math.round((h * maxDim) / w);
                        w = maxDim;
                    } else {
                        w = Math.round((w * maxDim) / h);
                        h = maxDim;
                    }
                }
                procWidth = w;
                procHeight = h;

                canvasIn.width = w;
                canvasIn.height = h;
                canvasOut.width = w;
                canvasOut.height = h;

                const ctxIn = canvasIn.getContext('2d');
                ctxIn.drawImage(imgElement, 0, 0, w, h);
                originalImageData = ctxIn.getImageData(0, 0, w, h);
                
                canvasOut.getContext('2d').clearRect(0, 0, w, h);
                document.getElementById('status').innerText = `Gambar dimuat & di-resize ke (${w}x${h} px) agar cepat.`;
            };
            imgElement.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // Helper untuk cegah Browser Freeze
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    // 2. PUSHBUTTON2: Segmentasi Async (Tidak akan Hang lagi)
    async function processChanVese() {
        if (!originalImageData) {
            alert("Silakan buka gambar terlebih dahulu!");
            return;
        }

        const numIter = parseInt(document.getElementById('edit1').value) || 200;
        const btn = document.getElementById('btnProcess');
        btn.disabled = true; // Matikan tombol sementara

        const width = procWidth;
        const height = procHeight;
        const srcData = originalImageData.data;

        // Grayscale
        const I = new Float32Array(width * height);
        for (let i = 0; i < width * height; i++) {
            I[i] = 0.299 * srcData[i*4] + 0.587 * srcData[i*4+1] + 0.114 * srcData[i*4+2];
        }

        // Inisialisasi Mask Phi
        const phi = new Float32Array(width * height);
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const idx = y * width + x;
                if (y >= 5 && y < height - 5 && x >= 15 && x < width - 15) {
                    phi[idx] = 2.0;
                } else {
                    phi[idx] = -2.0;
                }
            }
        }

        const dt = 0.5;
        const lambda1 = 1.0, lambda2 = 1.0, mu = 0.02 * 255 * 255;

        // Loop Utama
        for (let iter = 1; iter <= numIter; iter++) {
            let sumIn = 0, countIn = 0;
            let sumOut = 0, countOut = 0;

            for (let i = 0; i < width * height; i++) {
                if (phi[i] > 0) {
                    sumIn += I[i];
                    countIn++;
                } else {
                    sumOut += I[i];
                    countOut++;
                }
            }

            const c1 = countIn > 0 ? sumIn / countIn : 0;
            const c2 = countOut > 0 ? sumOut / countOut : 0;

            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    const idx = y * width + x;
                    const val = I[idx];

                    const phiX = (phi[idx + 1] - phi[idx - 1]) / 2;
                    const phiY = (phi[idx + width] - phi[idx - width]) / 2;
                    const phiXX = phi[idx + 1] + phi[idx - 1] - 2 * phi[idx];
                    const phiYY = phi[idx + width] + phi[idx - width] - 2 * phi[idx];
                    const phiXY = (phi[idx + width + 1] - phi[idx + width - 1] - phi[idx - width + 1] + phi[idx - width - 1]) / 4;

                    const gradSq = phiX * phiX + phiY * phiY + 1e-6;
                    const kappa = (phiXX * phiY * phiY - 2 * phiX * phiY * phiXY + phiYY * phiX * phiX) / Math.pow(gradSq, 1.5);

                    const force = -lambda1 * Math.pow(val - c1, 2) + lambda2 * Math.pow(val - c2, 2);
                    phi[idx] += dt * (mu * kappa + force);
                }
            }

            // Update Teks Indikator & Beri 'Napas' ke Browser Setiap 25 Iterasi
            if (iter % 25 === 0 || iter === numIter) {
                document.getElementById('status').innerText = `Sedang memproses: ${iter} / ${numIter} iterasi...`;
                await sleep(1); // Mencegah popup "This page isn't responding"
            }
        }

        // Binerisasi
        const seg = new Uint8Array(width * height);
        for (let i = 0; i < width * height; i++) {
            seg[i] = phi[i] > 0 ? 1 : 0;
        }

        // Bwareaopen yang disesuaikan ukurannya (min 100px)
        const cleanSeg = bwareaopen(seg, width, height, 100);

        // Render Overlay Merah
        const canvasOut = document.getElementById('canvasOutput');
        const ctxOut = canvasOut.getContext('2d');
        const outImageData = ctxOut.createImageData(width, height);

        for (let i = 0; i < width * height; i++) {
            const pxIdx = i * 4;
            if (cleanSeg[i] === 1) {
                outImageData.data[pxIdx] = 255;                   // Red
                outImageData.data[pxIdx + 1] = srcData[pxIdx + 1]; // Green
                outImageData.data[pxIdx + 2] = srcData[pxIdx + 2]; // Blue
            } else {
                outImageData.data[pxIdx] = srcData[pxIdx];
                outImageData.data[pxIdx + 1] = srcData[pxIdx + 1];
                outImageData.data[pxIdx + 2] = srcData[pxIdx + 2];
            }
            outImageData.data[pxIdx + 3] = 255;
        }

        ctxOut.putImageData(outImageData, 0, 0);
        document.getElementById('status').innerText = "Segmentasi Selesai!";
        btn.disabled = false;
    }

    function bwareaopen(binaryArray, width, height, minSize) {
        const visited = new Uint8Array(width * height);
        const result = new Uint8Array(binaryArray);
        const queue = new Int32Array(width * height);

        for (let i = 0; i < width * height; i++) {
            if (result[i] === 1 && !visited[i]) {
                let head = 0, tail = 0;
                queue[tail++] = i;
                visited[i] = 1;
                let count = 0;

                while (head < tail) {
                    const current = queue[head++];
                    count++;
                    const cx = current % width;
                    const cy = Math.floor(current / width);

                    const neighbors = [
                        cy > 0 ? current - width : -1,
                        cy < height - 1 ? current + width : -1,
                        cx > 0 ? current - 1 : -1,
                        cx < width - 1 ? current + 1 : -1
                    ];

                    for (let n of neighbors) {
                        if (n !== -1 && result[n] === 1 && !visited[n]) {
                            visited[n] = 1;
                            queue[tail++] = n;
                        }
                    }
                }

                if (count < minSize) {
                    for (let k = 0; k < tail; k++) {
                        result[queue[k]] = 0;
                    }
                }
            }
        }
        return result;
    }

    function resetApp() {
        originalImageData = null;
        document.getElementById('fileInput').value = '';
        document.getElementById('canvasInput').getContext('2d').clearRect(0, 0, 450, 450);
        document.getElementById('canvasOutput').getContext('2d').clearRect(0, 0, 450, 450);
        document.getElementById('status').innerText = "Aplikasi di-reset.";
    }
</script>
