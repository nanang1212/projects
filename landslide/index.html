<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUI PCITRA - Segmentasi Citra Chan-Vese</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
            color: #334155;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }
        .btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #1d4ed8;
        }
        .btn-danger {
            background-color: #ef4444;
        }
        .btn-danger:hover {
            background-color: #dc2626;
        }
        .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        input[type="number"] {
            width: 80px;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
            text-align: center;
        }
        .canvas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        .canvas-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .canvas-card h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #475569;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            background: #000;
        }
        #status {
            text-align: center;
            margin-top: 10px;
            font-weight: 600;
            color: #2563eb;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>GUI PCITRA - Active Contour (Chan-Vese)</h1>

    <!-- Panel Kontrol (Setara Pushbutton & Edit Text MATLAB) -->
    <div class="control-panel">
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <button class="btn" onclick="document.getElementById('fileInput').click()">1. Buka Citra (pushbutton1)</button>

        <div class="input-group">
            <label for="edit1"><strong>Iterasi (edit1):</strong></label>
            <input type="number" id="edit1" value="200" min="1" max="5000">
        </div>

        <button class="btn" id="btnProcess" onclick="processChanVese()">2. Segmentasi (pushbutton2)</button>
        <button class="btn btn-danger" onclick="resetApp()">3. Reset (pushbutton3)</button>
    </div>

    <div id="status"></div>

    <!-- Area Tampilan Gambar (Setara Axes MATLAB) -->
    <div class="canvas-grid">
        <div class="canvas-card">
            <h3>Citra Asli (axes1)</h3>
            <canvas id="canvasInput"></canvas>
        </div>
        <div class="canvas-card">
            <h3>Hasil Segmentasi (Overlay Red)</h3>
            <canvas id="canvasOutput"></canvas>
        </div>
    </div>
</div>

<script>
    let imgElement = new Image();
    let originalImageData = null;

    // 1. PUSHBUTTON1: Buka Gambar (imread)
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            imgElement.onload = function() {
                const canvasIn = document.getElementById('canvasInput');
                const canvasOut = document.getElementById('canvasOutput');
                const ctxIn = canvasIn.getContext('2d');
                
                canvasIn.width = imgElement.width;
                canvasIn.height = imgElement.height;
                canvasOut.width = imgElement.width;
                canvasOut.height = imgElement.height;

                ctxIn.drawImage(imgElement, 0, 0);
                originalImageData = ctxIn.getImageData(0, 0, imgElement.width, imgElement.height);
                
                // Clear output
                canvasOut.getContext('2d').clearRect(0, 0, canvasOut.width, canvasOut.height);
                document.getElementById('status').innerText = "Gambar berhasil dimuat (" + imgElement.width + "x" + imgElement.height + " px).";
            };
            imgElement.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // 2. PUSHBUTTON2: Jalankan Segmentasi Chan-Vese
    function processChanVese() {
        if (!originalImageData) {
            alert("Silakan buka gambar terlebih dahulu (Pushbutton 1)!");
            return;
        }

        const numIter = parseInt(document.getElementById('edit1').value) || 200;
        document.getElementById('status').innerText = "Sedang memproses " + numIter + " iterasi...";

        // Jalankan pemrosesan menggunakan setTimeout agar UI browser tidak hang
        setTimeout(() => {
            const width = originalImageData.width;
            const height = originalImageData.height;
            const srcData = originalImageData.data;

            // Konversi ke Grayscale
            const I = new Float32Array(width * height);
            for (let i = 0; i < width * height; i++) {
                I[i] = 0.299 * srcData[i*4] + 0.587 * srcData[i*4+1] + 0.114 * srcData[i*4+2];
            }

            // Inisialisasi Mask 'm' seperti pada Matlab: m(5:end-5, 30:end-30) = 1
            const phi = new Float32Array(width * height);
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = y * width + x;
                    if (y >= 5 && y < height - 5 && x >= 30 && x < width - 30) {
                        phi[idx] = 2.0; // Inside Level Set
                    } else {
                        phi[idx] = -2.0; // Outside Level Set
                    }
                }
            }

            // Iterasi Algoritma Chan-Vese
            const dt = 0.5;
            const lambda1 = 1.0, lambda2 = 1.0, mu = 0.02 * 255 * 255;

            for (let iter = 0; iter < numIter; iter++) {
                let sumIn = 0, countIn = 0;
                let sumOut = 0, countOut = 0;

                for (let i = 0; i < width * height; i++) {
                    if (phi[i] > 0) {
                        sumIn += I[i];
                        countIn++;
                    } else {
                        sumOut += I[i];
                        countOut++;
                    }
                }

                const c1 = countIn > 0 ? sumIn / countIn : 0;
                const c2 = countOut > 0 ? sumOut / countOut : 0;

                // Update PDE Level Set (kappa & force)
                for (let y = 1; y < height - 1; y++) {
                    for (let x = 1; x < width - 1; x++) {
                        const idx = y * width + x;
                        const val = I[idx];

                        // Turunan Parsial (Central Difference - kappa.m)
                        const phiX = (phi[idx + 1] - phi[idx - 1]) / 2;
                        const phiY = (phi[idx + width] - phi[idx - width]) / 2;
                        const phiXX = phi[idx + 1] + phi[idx - 1] - 2 * phi[idx];
                        const phiYY = phi[idx + width] + phi[idx - width] - 2 * phi[idx];
                        const phiXY = (phi[idx + width + 1] - phi[idx + width - 1] - phi[idx - width + 1] + phi[idx - width - 1]) / 4;

                        const gradSq = phiX * phiX + phiY * phiY + 1e-6;
                        const kappa = (phiXX * phiY * phiY - 2 * phiX * phiY * phiXY + phiYY * phiX * phiX) / Math.pow(gradSq, 1.5);

                        // Gaya Chan-Vese
                        const force = -lambda1 * Math.pow(val - c1, 2) + lambda2 * Math.pow(val - c2, 2);

                        phi[idx] += dt * (mu * kappa + force);
                    }
                }
            }

            // Binerisasi hasil (seg = phi > 0)
            const seg = new Uint8Array(width * height);
            for (let i = 0; i < width * height; i++) {
                seg[i] = phi[i] > 0 ? 1 : 0;
            }

            // Fitur bwareaopen(seg, 1000): Hapus area kecil di bawah 1000 px
            const cleanSeg = bwareaopen(seg, width, height, 1000);

            // Overlay Merah ke Gambar Asli (seperti di Matlab: img_red(img_merge) = 255)
            const canvasOut = document.getElementById('canvasOutput');
            const ctxOut = canvasOut.getContext('2d');
            const outImageData = ctxOut.createImageData(width, height);

            for (let i = 0; i < width * height; i++) {
                const pxIdx = i * 4;
                if (cleanSeg[i] === 1) {
                    outImageData.data[pxIdx] = 255;                       // R (Set Red)
                    outImageData.data[pxIdx + 1] = srcData[pxIdx + 1];     // G
                    outImageData.data[pxIdx + 2] = srcData[pxIdx + 2];     // B
                } else {
                    outImageData.data[pxIdx] = srcData[pxIdx];
                    outImageData.data[pxIdx + 1] = srcData[pxIdx + 1];
                    outImageData.data[pxIdx + 2] = srcData[pxIdx + 2];
                }
                outImageData.data[pxIdx + 3] = 255; // Alpha
            }

            ctxOut.putImageData(outImageData, 0, 0);
            document.getElementById('status').innerText = "Segmentasi selesai!";
        }, 50);
    }

    // Fungsi Pengganti bwareaopen.m (Connected Component Analysis)
    function bwareaopen(binaryArray, width, height, minSize) {
        const visited = new Uint8Array(width * height);
        const result = new Uint8Array(binaryArray);
        const queue = new Int32Array(width * height);

        for (let i = 0; i < width * height; i++) {
            if (result[i] === 1 && !visited[i]) {
                let head = 0, tail = 0;
                queue[tail++] = i;
                visited[i] = 1;
                let count = 0;

                while (head < tail) {
                    const current = queue[head++];
                    count++;

                    const cx = current % width;
                    const cy = Math.floor(current / width);

                    const neighbors = [
                        cy > 0 ? current - width : -1,
                        cy < height - 1 ? current + width : -1,
                        cx > 0 ? current - 1 : -1,
                        cx < width - 1 ? current + 1 : -1
                    ];

                    for (let n of neighbors) {
                        if (n !== -1 && result[n] === 1 && !visited[n]) {
                            visited[n] = 1;
                            queue[tail++] = n;
                        }
                    }
                }

                if (count < minSize) {
                    for (let k = 0; k < tail; k++) {
                        result[queue[k]] = 0;
                    }
                }
            }
        }
        return result;
    }

    // 3. PUSHBUTTON3: Reset App (close)
    function resetApp() {
        originalImageData = null;
        document.getElementById('fileInput').value = '';
        document.getElementById('canvasInput').getContext('2d').clearRect(0, 0, 300, 150);
        document.getElementById('canvasOutput').getContext('2d').clearRect(0, 0, 300, 150);
        document.getElementById('status').innerText = "Aplikasi di-reset.";
    }
</script>

</body>
</html>
